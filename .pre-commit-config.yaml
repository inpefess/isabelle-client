repos:
-   repo: local
    hooks:
    -   id: ty
        name: ty
        entry: ty check
        language: system
        types: [python]
    -   id: ruff check
        name:  ruff check
        entry: ruff check --fix
        language: system
        types: [python]
    -   id: ruff format
        name:  ruff format
        entry: ruff format
        language: system
        types: [python]
    -   id: pydoclint
        name:  pydoclint
        entry: pydoclint
        language: system
        types: [python]
